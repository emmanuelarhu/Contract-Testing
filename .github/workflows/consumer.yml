# =============================================================================
# GitHub Actions CI — CONSUMER (ussd-flow-engine)
#
# Required Secrets (Settings → Secrets → Actions):
#   PACT_BROKER_BASE_URL  /  PACT_BROKER_USERNAME  /  PACT_BROKER_PASSWORD
#
# Pipeline: test → pact-publish → deploy-staging | deploy-production
# =============================================================================

name: Consumer — Pact CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  GIT_SHA: ${{ github.sha }}
  GIT_BRANCH: ${{ github.ref_name }}
  PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
  PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
  PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Unit tests
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/node-setup
        with:
          working-directory: consumer
      - run: npm test
        working-directory: consumer

  # ---------------------------------------------------------------------------
  # 2. Generate Pact contracts and publish to broker
  # ---------------------------------------------------------------------------
  pact-publish:
    name: Publish Pact Contracts
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/node-setup
        with:
          working-directory: consumer
      - run: npm run test:pact
        working-directory: consumer
      - run: npm run pact:publish
        working-directory: consumer
      - uses: actions/upload-artifact@v4
        with:
          name: pacts
          path: consumer/pacts/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 3a. Gate + deploy → staging  (main branch only)
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: pact-publish
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.cellulant.internal
    env:
      DEPLOY_ENV: staging
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/node-setup
        with:
          working-directory: consumer
      - run: npm run can-i-deploy
        working-directory: consumer
      - run: ./deploy.sh staging
        working-directory: consumer
      - run: npm run record-deployment
        working-directory: consumer

  # ---------------------------------------------------------------------------
  # 3b. Gate + deploy → production  (tags only, requires manual approval)
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: pact-publish
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: production          # configure manual approval in GitHub Environments
      url: https://prod.cellulant.com
    env:
      DEPLOY_ENV: production
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/node-setup
        with:
          working-directory: consumer
      - run: npm run can-i-deploy
        working-directory: consumer
      - run: ./deploy.sh production
        working-directory: consumer
      - run: npm run record-deployment
        working-directory: consumer
