# =============================================================================
# GitHub Actions CI — PROVIDER (payment-service)
#
# Required Secrets (Settings → Secrets → Actions):
#   PACT_BROKER_BASE_URL  /  PACT_BROKER_USERNAME  /  PACT_BROKER_PASSWORD
#
# Pipeline: test → pact-verify → deploy-staging | deploy-production
#
# Broker webhook: configure workflow_dispatch trigger in Pact Broker pointing
# to this repo; pass input TRIGGERED_BY_PACT_CHANGED=true.
# =============================================================================

name: Provider — Pact CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      TRIGGERED_BY_PACT_CHANGED:
        description: Set to true when triggered by Pact Broker webhook
        required: false
        default: "false"

env:
  GIT_SHA: ${{ github.sha }}
  GIT_BRANCH: ${{ github.ref_name }}
  PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
  PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
  PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Unit tests
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/node-setup
        with:
          working-directory: provider
      - run: npm test
        working-directory: provider

  # ---------------------------------------------------------------------------
  # 2. Start provider, pull contracts from broker, verify, publish results
  # ---------------------------------------------------------------------------
  pact-verify:
    name: Verify Pact Contracts
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/node-setup
        with:
          working-directory: provider
      - name: Start provider service
        run: |
          npm start &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
        working-directory: provider
      - name: Wait for service to be ready
        run: sleep 10
      - name: Verify contracts from broker
        run: npm run test:pact:broker
        working-directory: provider
      - name: Stop provider service
        if: always()
        run: kill $SERVER_PID || true

  # ---------------------------------------------------------------------------
  # 3a. Gate + deploy → staging  (main branch only)
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: pact-verify
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
    env:
      DEPLOY_ENV: staging
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/node-setup
        with:
          working-directory: provider
      - run: npm run can-i-deploy
        working-directory: provider
      - run: ./deploy.sh staging
        working-directory: provider
      - run: npm run record-deployment
        working-directory: provider

  # ---------------------------------------------------------------------------
  # 3b. Gate + deploy → production  (tags only, requires manual approval)
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: pact-verify
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: production          # configure manual approval in GitHub Environments
    env:
      DEPLOY_ENV: production
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/node-setup
        with:
          working-directory: provider
      - run: npm run can-i-deploy
        working-directory: provider
      - run: ./deploy.sh production
        working-directory: provider
      - run: npm run record-deployment
        working-directory: provider
