# =============================================================================
# GitHub Actions CI for PROVIDER repo (e.g. payment-service)
# =============================================================================
# Required GitHub Secrets (Settings → Secrets → Actions):
#   PACT_BROKER_BASE_URL    = https://pact-broker.cellulant.internal
#   PACT_BROKER_USERNAME    = (masked)
#   PACT_BROKER_PASSWORD    = (masked)
#
# Pipeline flow:
#   test → contract-verification → can-i-deploy → deploy → record-deployment
#
# Also triggered by Pact Broker webhook:
#   Add a webhook in the broker pointing to this repo's workflow_dispatch
#   with { "TRIGGERED_BY_PACT_CHANGED": "true" } in the inputs.
# =============================================================================

name: Provider — Pact CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      TRIGGERED_BY_PACT_CHANGED:
        description: "Set to true when triggered by Pact Broker webhook"
        required: false
        default: "false"

env:
  GIT_SHA: ${{ github.sha }}
  GIT_BRANCH: ${{ github.ref_name }}
  PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
  PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
  PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}

jobs:
  # ===========================================================================
  # Stage 1: Standard tests
  # ===========================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: provider
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: provider/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ===========================================================================
  # Stage 2: Pull contracts from broker, verify, publish results back
  # ===========================================================================
  provider-pact-verification:
    name: Verify Pact Contracts
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: provider
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: provider/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start provider service in background
        run: |
          npm start &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for service to be ready
        run: sleep 10

      - name: Verify contracts from broker
        run: npm run test:pact:broker

      - name: Stop provider service
        if: always()
        run: kill $SERVER_PID || true

  # ===========================================================================
  # Stage 3: can-i-deploy — gate before deployment
  # ===========================================================================
  can-i-deploy-staging:
    name: Can I Deploy? (staging)
    runs-on: ubuntu-latest
    needs: provider-pact-verification
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: provider
    env:
      DEPLOY_ENV: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: provider/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check broker — safe to deploy to staging?
        run: npm run can-i-deploy

  can-i-deploy-production:
    name: Can I Deploy? (production)
    runs-on: ubuntu-latest
    needs: provider-pact-verification
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: production-gate  # requires manual approval in GitHub Environments
    defaults:
      run:
        working-directory: provider
    env:
      DEPLOY_ENV: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: provider/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check broker — safe to deploy to production?
        run: npm run can-i-deploy

  # ===========================================================================
  # Stage 4: Deploy + record deployment to broker
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: can-i-deploy-staging
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: provider
    environment:
      name: staging
    env:
      DEPLOY_ENV: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: provider/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy to staging
        run: ./deploy.sh staging   # replace with your actual deploy step

      - name: Record deployment in Pact Broker
        run: npm run record-deployment

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: can-i-deploy-production
    if: startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: provider
    environment:
      name: production
    env:
      DEPLOY_ENV: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: provider/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy to production
        run: ./deploy.sh production

      - name: Record deployment in Pact Broker
        run: npm run record-deployment
