name: Node.js Setup
description: Set up Node 20 and install dependencies via npm ci

inputs:
  working-directory:
    description: Directory that contains package-lock.json
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: npm
        cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

    - run: npm ci
      shell: bash
      working-directory: ${{ inputs.working-directory }}
